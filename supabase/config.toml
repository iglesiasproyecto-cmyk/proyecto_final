# Supabase project configuration
# https://supabase.com/docs/guides/cli/config

[api]
enabled = true
port = 54321

[db]
port = 54322

[studio]
enabled = true
port = 54323

[inbucket]
enabled = true
port = 54324

[auth]
enabled = true
site_url = "http://localhost:5173"
uri_allow_list = ["localhost", "127.0.0.1"]
redirect_urls = ["http://localhost:5173/app", "http://localhost:5173/auth/callback"]

[auth.email]
enable_confirmations = false
auto_confirm = true

